<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Onboarding Agent</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <h1>Teacher Onboarding Agent</h1>
    <p>Pick a grade level and subject to generate a customized onboarding guide.</p>
  </header>

  <main>
    <section id="choice-screen" class="choice-screen">
      <h2>What do you want to explore?</h2>
      <div class="choice-grid">
        <button type="button" class="choice-card" id="choice-curriculum">
          <span class="choice-icon" aria-hidden="true">📚</span>
          <span class="choice-label">Standards</span>
          <span class="choice-desc">Pacing suggestions by grade and subject, linked to the official standards.</span>
        </button>
        <button type="button" class="choice-card" id="choice-veracross">
          <span class="choice-icon" aria-hidden="true">💻</span>
          <span class="choice-label">Veracross</span>
          <span class="choice-desc">Step-by-step guide to logging in, attendance, and grades.</span>
        </button>
        <button type="button" class="choice-card" id="choice-checklist">
          <span class="choice-icon" aria-hidden="true">✅</span>
          <span class="choice-label">First-Week Checklist</span>
          <span class="choice-desc">The concrete things to confirm before school starts.</span>
        </button>
        <button type="button" class="choice-card" id="choice-atlas">
          <span class="choice-icon" aria-hidden="true">🗺️</span>
          <span class="choice-label">Atlas Curriculum Maps</span>
          <span class="choice-desc">How to find and use the team's official curriculum maps.</span>
        </button>
      </div>
    </section>

    <a href="#" id="back-link" class="back-link hidden">&larr; Back to start</a>

    <form id="generator-form" class="generator-form hidden">
      <div class="field">
        <label for="grade-select">Grade level</label>
        <select id="grade-select" required>
          <option value="" disabled selected>Select grade</option>
        </select>
      </div>

      <div class="field">
        <label for="subject-select">Subject</label>
        <select id="subject-select" required>
          <option value="" disabled selected>Select subject</option>
        </select>
      </div>

      <button type="submit">Generate Onboarding Guide</button>
    </form>

    <button id="print-btn" class="print-btn hidden">Print / Save as PDF</button>

    <div id="guide-output" class="guide-output hidden"></div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
